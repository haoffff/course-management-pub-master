name: Security Pipeline Full

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-scans:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Project
        run: chmod +x mvnw && ./mvnw clean package -DskipTests

      - name: SAST Scan (Semgrep)
        run: docker run --rm -v $(pwd):/src returntocorp/semgrep semgrep scan --config="auto"

      - name: Container Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'eclipse-temurin:21-jdk-jammy'
          format: 'table'
          severity: 'CRITICAL,HIGH'

      - name: Dependency Scan (OWASP)
        run: |
          VERSION=$(curl -s https://jeremylong.github.io/DependencyCheck/current.txt)
          curl -Ls "https://github.com/jeremylong/DependencyCheck/releases/download/v$VERSION/dependency-check-$VERSION-release.zip" --output check.zip
          unzip check.zip
          ./dependency-check/bin/dependency-check.sh --project "MyProject" --scan . --format "HTML" --out .
